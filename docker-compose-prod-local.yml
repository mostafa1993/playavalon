services:
  app:
    build: .
    ports:
      - "3000:3000"
    env_file: .env.local
    depends_on:
      - livekit
      - redis

  livekit:
    image: livekit/livekit-server:latest
    network_mode: host
    volumes:
      - ./livekit-dev.yaml:/etc/livekit.yaml
    command: ["--config", "/etc/livekit.yaml"]

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
