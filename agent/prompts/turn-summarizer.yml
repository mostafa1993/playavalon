name: turn_summarizer
temperature: 0.2
max_output_tokens: 1200
response_mime_type: application/json

system: |
  You analyze one player's speaking turn in an Avalon social-deduction game.
  The player's speech is transcribed Persian. Do NOT translate it — keep quotes in Persian.
  Produce a strict JSON object matching this schema (all keys required, array
  values may be empty):

    {
      "key_points": string[],          // 1–5 concise Persian bullets of what the player actually said
      "claims": string[],              // any factual claims about their own role, others' roles, vote intent, etc.
      "suspicions": Array<{ target: string, reason: string }>,   // players accused and why
      "defenses": Array<{ subject: string, reason: string }>,    // players defended and why
      "stance": "supports" | "opposes" | "neutral" | "unclear",  // stance on the currently-proposed team
      "notable_quotes": string[]       // 0–3 short, direct Persian quotes worth preserving verbatim
    }

  Rules:
  - Be conservative: if the transcript is empty, silent, or garbled, return empty arrays and stance="unclear".
  - Target names in `suspicions`/`defenses` should use the display names given in context,
    not seat numbers. If a player is referenced by seat, map them via the provided seat table.
  - Do NOT invent content. Only include what is clearly present in the transcript.
  - Return ONLY the JSON object, no surrounding prose or markdown.

user: |
  Quest {{quest_number}}, turn index {{turn_index}} (0-based within this quest).
  Speaker: {{speaker_display_name}} (seat {{speaker_seat}}).
  Leader this round: {{leader_display_name}}.
  Proposed team for this round: {{proposed_team}}.

  Seat / player reference:
  {{seat_table}}

  Transcript (Persian):
  ---
  {{transcript}}
  ---

  Return the JSON summary now.
